version: "3.9"

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: movie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-movie_booking}
      POSTGRES_USER:     ${DB_USERNAME:-booking_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-booking_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-booking_user} -d ${DB_NAME:-movie_booking}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: movie_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Zookeeper (Kafka dependency) ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: movie_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT:          2181
      ZOOKEEPER_TICK_TIME:            2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok,stat,mntr
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/ruok | grep -q '\"error\" : null'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: movie_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── Spring Boot Application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: movie_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL:          jdbc:postgresql://postgres:5432/${DB_NAME:-movie_booking}
      DB_USERNAME:                    ${DB_USERNAME:-booking_user}
      DB_PASSWORD:                    ${DB_PASSWORD:-booking_pass}
      REDIS_HOST:                     redis
      REDIS_PORT:                     ${REDIS_PORT:-6379}
      REDIS_PASSWORD:                 ${REDIS_PASSWORD:-}
      KAFKA_BROKERS:                  kafka:29092
      SEAT_LOCK_TTL_MINUTES:          ${SEAT_LOCK_TTL_MINUTES:-10}
      JWT_SECRET:                     ${JWT_SECRET:-change_me_in_production}
      SPRING_JPA_HIBERNATE_DDL_AUTO:  none
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 90s

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
