version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Local development tooling — NOT intended for CI or production.
# Adds pgAdmin4 and RedisInsight alongside the core stack.
#
# Usage:
#   docker compose up                        # starts everything (core + tools)
#   docker compose up app postgres redis     # core only, skip dev tools
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── pgAdmin4 ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: movie_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── RedisInsight ──────────────────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: movie_redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8001:5540"
    volumes:
      - redisinsight_data:/data

volumes:
  pgadmin_data:
  redisinsight_data:
